<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Library</title>
  </head>
  <body>
    
    <header class="top-page">
      <div class="my-library-log">
        <img
          src="./img/livro.png"
          alt="livro"
          class="img-book-header"
          width="50"
        />
        <section class="text">
          <h2>Minha Livraria</h2>
          <p>Meus Livros, minhas histórias</p>
        </section>
      </div>
      <button type="button" class="add-books">+ Add Books</button>
    </header>
    <main>
      <div class="read-books">
        <section class="cards-session">
          <header>
            <div>
            <h2 class="read">Books read</h2>
            <p class="messagem-read">Books that are on my list</p>
            </div>
          </header>
          <div class="cards">
            <article class="article-cards">
              <header class="top-of-article">
                <h1>The Art of War</h1>
              </header>
              <section class="cards-section">
                
                <p class="author">Sun Tzu</p>
                <p class="pages">PG:112</p>
               
              </section>
              <div class="card-styles">
              <div>
                <p class="reading">read</p>
              </div>
              <div class="btn">
                  <button class="delete-card"></button>
              </div>
              </div>
            </article>
          </div>
        </section>
        <div>
        <img src="./img/Ler.png" alt="Livros" />
      </div>

      <dialog class="modal">
        <form class="my-form">
          <div class="style-form title">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" />
          </div>
          <div class="style-form">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" />
          </div>
          <div class="style-form">
            <label for="pages">Pages</label>
            <input type="number" id="pages" name="pages" />
          </div>
          <div class="style-radio">
            <div>
              <input type="radio" id="read" name="read" value="read" checked />
              <label for="read">Read</label>
            </div>
            <div>
              <input type="radio" id="not-read" name="read" value="not-read" />
              <label for="not-red">Not Read</label>
            </div>
          </div>
          <div class="btn-submit">
            <button type="submit" class="send-form">Enviar</button>
            <button type="button" class="close-modal">Cancelar</button>
          </div>
        </form>
      </dialog>
    </main>
    <footer>
      <div>
        <img src="./img/livro.png" width="40" />
        <p>"Ler é viajar sem sair do lugar."</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
