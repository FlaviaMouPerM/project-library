<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Library</title>
  </head>
  <body>
    <!-- objetos de livro armazenados em um array
     construtor para livros
     adicione uma função separada
     criar um livro a partir desses argumentos e armazenar o novo objeto livro em um array
     cada livro tenha um identificador único id gerado usando crypto.randomUUID()
      função que percorra o array e exiba cada livro na página
       botão "Novo Livro"
       autor, título, número de páginas, se já foi lido

     -->
    <header class="topPage">
      <div class="mylibrarylog">
        <img src="./img/livro.png" alt="livro" class="livriTop" width="50" />
        <section class="text">
          <h2>Minha Livraria</h2>
          <p>Meus Livros, minhas histórias</p>
        </section>
      </div>
      <button type="button" class="openModal">+ Add Books</button>
    </header>
    <main>
      <div class="read-books">
        <section class="cardSession">
          <header>
            <h2 class="read">Books read</h2>
            <p>Books that are on my list</p>
          </header>
          <div class="cards">
            <article>
              <header class="topCard">
                <h1>The Art of War</h1>
              </header>
              <section>
                <p>Sun Tzu</p>
                <p>PG:112</p>
              </section>
              <div>lido</div>
            </article>
          </div>
        </section>

        <img src="./img/Ler.png" alt="Livros" />
      </div>

      <div class="to-read">
        <section class="cardSession">
          <header>
            <h2 class="read">To read</h2>
            <p>Books I've finished</p>
          </header>

          <div class="cards">
            <article>
              <header class="topCard">
                <h1>The Art of War</h1>
              </header>
              <section>
                <p>Sun Tzu</p>
                <p>PG:112</p>
              </section>
              <div>Status</div>
            </article>
          </div>
        </section>
        <img src="./img/Li.png" alt="livro" />
      </div>
      <div class="modal" style="display: none;">
      <form class="myForm"  style="display: none">
        <div class="styleForm title">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" />
        </div>
        <div class="styleForm">
          <label for="author">Author</label>
          <input type="text" id="author" name="author" />
        </div>
        <div class="styleForm">
          <label for="pages">Pages</label>
          <input type="number" id="pages" name="pages" />
        </div>
        <div class="styleRadio">
          <div>
            <input type="radio" id="read" name="read" value="read" />
            <label for="read">Read</label>
          </div>
          <div>
            <input type="radio" id="notRed" name="read" value="not-read" />
            <label for="not-red">Not Read</label>
          </div>  
        </div>
        <div>
          <button type="submit" class="sendForm" >Enviar</button>
          <button type="button" class="closeModal">Cancelar</button>
        </div>
      </form>
      </div>
    </main>
    <footer>
      <div>
        <img src="./img/livro.png" width="40" />
        <p>"Ler é viajar sem sair do lugar."</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
