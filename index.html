<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Library</title>
  </head>
  <body>
    <!-- objetos de livro armazenados em um array
     construtor para livros
     adicione uma função separada
     criar um livro a partir desses argumentos e armazenar o novo objeto livro em um array
     cada livro tenha um identificador único id gerado usando crypto.randomUUID()
      função que percorra o array e exiba cada livro na página
       botão "Novo Livro"
       autor, título, número de páginas, se já foi lido

     -->
    <header class="top-page">
      <div class="my-library-log">
        <img
          src="./img/livro.png"
          alt="livro"
          class="img-book-header"
          width="50"
        />
        <section class="text">
          <h2>Minha Livraria</h2>
          <p>Meus Livros, minhas histórias</p>
        </section>
      </div>
      <button type="button" class="add-books">+ Add Books</button>
    </header>
    <main>
      <div class="read-books">
        <section class="cards-session">
          <header>
            <h2 class="read">Books read</h2>
            <p>Books that are on my list</p>
          </header>
          <div class="cards">
            <article>
              <header class="top-of-article">
                <h1>The Art of War</h1>
              </header>
              <section>
                <p>Sun Tzu</p>
                <p>PG:112</p>
              </section>
              <div>lido</div>
            </article>
          </div>
        </section>

        <img src="./img/Ler.png" alt="Livros" />
      </div>

      <div class="to-read">
        <section class="cardSession">
          <header>
            <h2 class="read">To read</h2>
            <p>Books I've finished</p>
          </header>

          <div class="cards">
            <article>
              <header class="top-of-article">
                <h1>The Art of War</h1>
              </header>
              <section>
                <p>Sun Tzu</p>
                <p>PG:112</p>
              </section>
              <div>Status</div>
            </article>
          </div>
        </section>
        <img src="./img/Li.png" alt="livro" />
      </div>
      <dialog class="modal">
        <form class="my-form">
          <div class="style-form title">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" />
          </div>
          <div class="style-form">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" />
          </div>
          <div class="style-form">
            <label for="pages">Pages</label>
            <input type="number" id="pages" name="pages" />
          </div>
          <div class="style-radio">
            <div>
              <input type="radio" id="read" name="read" value="read" checked />
              <label for="read">Read</label>
            </div>
            <div>
              <input type="radio" id="not-read" name="read" value="not-read" />
              <label for="not-red">Not Read</label>
            </div>
          </div>
          <div>
            <button type="submit" class="send-form">Enviar</button>
            <button type="button" class="close-modal">Cancelar</button>
          </div>
        </form>
      </dialog>
    </main>
    <footer>
      <div>
        <img src="./img/livro.png" width="40" />
        <p>"Ler é viajar sem sair do lugar."</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
